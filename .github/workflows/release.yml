name: Release Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Prepare release assets
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release/codexdian
          cp manifest.json main.js styles.css release/codexdian/
          cp manifest.json release/
          cp main.js release/
          cp styles.css release/
          cd release
          zip -r "codexdian-${VERSION}.zip" codexdian

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/manifest.json
            release/main.js
            release/styles.css
            release/codexdian-*.zip
          generate_release_notes: true
